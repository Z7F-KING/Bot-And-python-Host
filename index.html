<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola Python Executor</title>
    <!-- خطوط Google -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --console-bg: #010409;
            --card-bg: #21262d;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية للجوال والكمبيوتر */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-color);
            border-bottom: 1px solid #30363d;
            text-align: center;
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #21262d;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #21262d;
            border-right: 4px solid var(--accent-color);
        }

        /* المنطقة الرئيسية */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        header {
            padding: 15px;
            background: var(--sidebar-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .container { padding: 20px; flex: 1; }

        /* المحرر (Textarea) */
        textarea {
            width: 100%;
            height: 350px;
            background: var(--console-bg);
            color: #d7dae0;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* الكونسول */
        .console-area {
            background: var(--console-bg);
            color: #7ef17e;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            min-height: 200px;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            font-size: 13px;
        }

        /* الأزرار */
        .run-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
        }

        .run-btn:hover { background-color: #2ea043; }

        /* تعديلات الجوال */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                overflow-x: auto;
            }
            .sidebar-header { display: none; }
            .menu-item { padding: 10px 15px; white-space: nowrap; }
            textarea { height: 250px; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Python IDLE Pro</div>
    <div class="menu-item active" id="btn-main" onclick="switchTab('main')">
        📁 main.py
    </div>
    <div class="menu-item" id="btn-console" onclick="switchTab('console')">
        📟 Console
    </div>
</div>

<div class="main-content">
    <header>
        <div id="page-title">الملف الحالي: main.py</div>
    </header>

    <div class="container" id="main-section">
        <textarea id="editor" placeholder="أدخل كود بايثون هنا... 
مثال:
import os
os.mkdir('my_folder')
print('تم إنشاء المجلد بنجاح!')"></textarea>
        <button class="run-btn" onclick="runScript()">تشغيل الأداة (Execute)</button>
    </div>

    <div class="container hidden" id="console-section">
        <div class="console-area" id="output">الكونسول جاهز لاستلام المخرجات...</div>
    </div>
</div>

<script>
    function switchTab(tab) {
        // إدارة التبديل بين الصفحات
        if(tab === 'main') {
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('console-section').classList.add('hidden');
            document.getElementById('btn-main').classList.add('active');
            document.getElementById('btn-console').classList.remove('active');
            document.getElementById('page-title').innerText = "الملف الحالي: main.py";
        } else {
            document.getElementById('main-section').classList.add('hidden');
            document.getElementById('console-section').classList.remove('hidden');
            document.getElementById('btn-console').classList.add('active');
            document.getElementById('btn-main').classList.remove('active');
            document.getElementById('page-title').innerText = "شاشة الكونسول";
        }
    }

    async function runScript() {
        const code = document.getElementById('editor').value;
        const outputDiv = document.getElementById('output');

        if(!code.trim()) {
            alert("يرجى كتابة كود أولاً!");
            return;
        }

        outputDiv.innerText = "> جاري تنفيذ الكود... انتظر قليلاً";
        switchTab('console'); // الانتقال التلقائي للكونسول لرؤية النتيجة

        try {
            const response = await fetch('/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code})
            });
            const data = await response.json();
            outputDiv.innerText = data.output || "> تم التنفيذ (لا توجد مخرجات نصية)";
        } catch (error) {
            outputDiv.innerText = "> خطأ في الاتصال بالسيرفر!";
        }
    }
</script>

</body>
</html>
