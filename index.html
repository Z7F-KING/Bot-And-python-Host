<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola IDE - Python Runner</title>
    <!-- CSS لـ Xterm.js والتنسيق العام -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --side: #151921; --accent: #0078d4; --text: #d1d5db; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation */
        .nav { background: var(--side); padding: 10px 20px; display: flex; gap: 20px; border-bottom: 1px solid #2d333b; align-items: center; justify-content: space-between; }
        .tabs { display: flex; gap: 10px; }
        .tab { cursor: pointer; padding: 8px 15px; border-radius: 5px; font-size: 14px; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; }
        
        /* Main Layout */
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        textarea { flex: 1; background: #1e1e1e; color: #9cdcfe; border: 1px solid #30363d; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; resize: none; min-height: 300px; outline: none; }
        
        /* Terminal Section */
        #terminal-container { height: 250px; background: black; padding: 10px; border-top: 2px solid #333; display: none; }
        .show-terminal { display: block !important; }

        .run-btn { background: #28a745; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .run-btn:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .nav { flex-direction: column; gap: 10px; }
            textarea { height: 200px; }
        }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight: bold; color: var(--accent);">اسمي Dola | Python IDLE</div>
    <div class="tabs">
        <div class="tab active" onclick="showSection('main')">📄 main.py</div>
        <div class="tab" onclick="showSection('console')">💻 Terminal</div>
    </div>
    <button class="run-btn" onclick="executeCode()">تشغيل (Run)</button>
</div>

<div class="editor-container" id="main-section">
    <textarea id="code-editor" spellcheck="false" placeholder="# الصق كود الأداة هنا...
import os
print('جاري فحص النظام...')"></textarea>
</div>

<div id="terminal-container">
    <div id="terminal"></div>
</div>

<!-- مكتبة Xterm.js -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>

<script>
    // إعداد التيرمينال
    const term = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000', foreground: '#00ff00' },
        fontSize: 14,
        fontFamily: 'Fira Code'
    });
    term.open(document.getElementById('terminal'));
    term.writeln('--- تيرمينال Dola جاهز ---');

    function showSection(name) {
        const terminal = document.getElementById('terminal-container');
        const main = document.getElementById('main-section');
        const tabs = document.querySelectorAll('.tab');

        if (name === 'console') {
            terminal.classList.add('show-terminal');
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        } else {
            terminal.classList.remove('show-terminal');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        }
    }

    async function executeCode() {
        const code = document.getElementById('code-editor').value;
        if (!code) return alert("الكود فارغ!");

        showSection('console');
        term.writeln('\r\n[+] جاري تشغيل الأداة...');

        try {
            const response = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            });
            const data = await response.json();
            
            // كتابة النتيجة في التيرمينال
            term.writeln(data.output.replace(/\n/g, '\r\n'));
            term.writeln('--------------------------');
        } catch (err) {
            term.writeln('\x1b[31m[!] خطأ في الاتصال بالسيرفر\x1b[0m');
        }
    }
</script>

</body>
</html>
