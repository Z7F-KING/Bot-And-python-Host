<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--sidebar); border-left: 1px solid #30363d; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #21262d; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #21262d; color: #58a6ff; }
        
        /* Content Area */
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        textarea { width: 100%; height: 60vh; background: #010409; color: #79c0ff; border: 1px solid #30363d; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 14px; outline: none; }
        
        /* Terminal & Files Section */
        .console-box { background: #000; color: #39ff14; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; font-family: 'Fira Code', monospace; white-space: pre-wrap; display: none; }
        .file-list { display: none; list-style: none; padding: 0; }
        .file-item { padding: 10px; background: #21262d; margin-bottom: 5px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
        
        .active-section { display: block !important; }
        .run-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
            .nav-item { white-space: nowrap; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-item active" onclick="show('main')">📄 main.py</div>
    <div class="nav-item" onclick="show('console')">💻 Console</div>
    <div class="nav-item" onclick="show('files'); loadFiles();">📁 Files & Folders</div>
</div>

<div class="main">
    <div id="section-main" class="active-section">
        <h2>المحرر (main.py)</h2>
        <textarea id="editor" placeholder="import os&#10;os.mkdir('NewFolder')&#10;print('Done!')"></textarea>
        <button class="run-btn" onclick="runCode()">تشغيل الأداة ▶️</button>
    </div>

    <div id="section-console" class="console-box">
        > الكونسول جاهز...
    </div>

    <div id="section-files" class="file-list">
        <h2>الملفات والمجلدات المنشأة:</h2>
        <div id="file-container"></div>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.active-section').forEach(el => el.classList.remove('active-section'));
        document.getElementById('section-' + id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    async function runCode() {
        const code = document.getElementById('editor').value;
        const consoleBox = document.getElementById('section-console');
        show('console');
        consoleBox.innerText = "> جاري التشغيل...";

        const res = await fetch('/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code})
        });
        const data = await res.json();
        consoleBox.innerText = data.output;
        updateFileList(data.files);
    }

    async function loadFiles() {
        const res = await fetch('/get_files');
        const data = await res.json();
        updateFileList(data.files);
    }

    function updateFileList(files) {
        const container = document.getElementById('file-container');
        container.innerHTML = files.map(f => `<div class="file-item">📁 ${f}</div>`).join('');
    }
</script>

</body>
</html>
